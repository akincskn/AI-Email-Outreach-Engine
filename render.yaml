# Render Blueprint (reference). The primary deploy path is the manual UI walkthrough
# in docs/DEPLOYMENT.md; this file documents the same config as infra-as-code.
#
# DB: we use Neon PostgreSQL (not a Render-managed DB), so DATABASE_URL is entered
# manually as a JDBC URL: jdbc:postgresql://<host>/<db>?sslmode=require
# (Render's managed-DB connectionString is non-JDBC and would break Spring's datasource.url.)
services:
  # ── Spring Boot API ──────────────────────────────────────────────
  - type: web
    name: outreach-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Database (Neon — JDBC URL + credentials entered manually)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false

      # Mail — SMTP send AND IMAP reply/bounce login both use MAIL_USERNAME/MAIL_PASSWORD
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        value: Akın Coşkun
      - key: GMAIL_IMAP_HOST
        value: imap.gmail.com
      - key: GMAIL_IMAP_PORT
        value: "993"
      - key: GMAIL_ACCOUNT_CREATED_AT
        sync: false

      # AI
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MOCK_ENABLED
        value: "false"
      - key: GOOGLE_MAPS_API_KEY
        sync: false

      # Discovery — Apify (second company data source; unset => OSM-only)
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_GOOGLE_MAPS_ACTOR
        value: compass~crawler-google-places
      - key: APIFY_MAX_PLACES
        value: "20"

      # Sender (CAN-SPAM)
      - key: SENDER_PHYSICAL_ADDRESS
        sync: false
      - key: SENDER_GITHUB
        value: https://github.com/akincskn
      - key: SENDER_PORTFOLIO
        value: https://akin-coskun.web.app

      # Security — generate fresh strong values for production
      - key: API_KEY
        sync: false
      - key: HMAC_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: N8N_WEBHOOK_API_KEY
        sync: false

      # URLs / CORS — fill BASE_URL after the service URL is assigned,
      # CORS_ALLOWED_ORIGINS after Vercel is deployed
      - key: BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: RATE_LIMIT_RPM
        value: "100"

  # ── N8N Orchestrator ─────────────────────────────────────────────
  - type: web
    name: outreach-n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    region: frankfurt
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    envVars:
      - key: N8N_HOST
        value: outreach-n8n.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://outreach-n8n.onrender.com/
      - key: GENERIC_TIMEZONE
        value: UTC
      - key: DB_TYPE
        value: sqlite
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      # Spring Boot API base URL, reachable from N8N
      - key: SPRING_API_URL
        sync: false
