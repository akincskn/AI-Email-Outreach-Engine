spring:
  application:
    name: outreach-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/outreach}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      # Neon free tier is serverless and drops idle connections (~5 min). Without
      # validation, HikariCP hands out a dead connection and the first query of a
      # run fails with "terminating connection due to administrator command".
      # keepalive pings below the idle window keep pooled connections alive, and
      # connection-test-query validates one before it leaves the pool.
      connection-test-query: SELECT 1
      validation-timeout: 5000
      idle-timeout: 60000
      max-lifetime: 300000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        mime:
          charset: UTF-8
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Fail-fast instead of the default -1 (infinite) wait. Render free tier
          # cold start to Gmail can take >15s; 30s tolerates the cold start while
          # still surfacing a clear error on a genuine stall.
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000
        transport:
          protocol: smtp

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    # MailHealthIndicator opens an SMTP connection on every health ping. On Render
    # free tier cold start that connect takes ~15s and flips /actuator/health to
    # DOWN even though the app is fine. SMTP problems surface at send time anyway.
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${BASE_URL:http://localhost:8080}

  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-production-32chars}
    jwt-expiration-ms: 86400000
    hmac-secret: ${HMAC_SECRET:dev-hmac-secret-change-in-production-32chars}
    n8n-api-key: ${N8N_WEBHOOK_API_KEY:dev-n8n-api-key}
    # Bearer token for /api/** and /agent/** (Görev 8.1). Override in production.
    api-key: ${API_KEY:dev-api-key-change-in-production-32chars}

  sender:
    physical-address: ${SENDER_PHYSICAL_ADDRESS:Sarıyer, Pınar Mahallesi, Dut Sokak No:15, İstanbul, Türkiye}
    from-name: ${MAIL_FROM_NAME:Akın Coşkun}
    from-email: ${MAIL_FROM:test@localhost}
    portfolio-url: ${SENDER_PORTFOLIO:https://akin-coskun.web.app}
    github-url: ${SENDER_GITHUB:https://github.com/akincskn}

  test:
    recipient-override: ${LOCAL_TEST_RECIPIENT_OVERRIDE:}

  gmail:
    imap-host: ${GMAIL_IMAP_HOST:imap.gmail.com}
    imap-port: ${GMAIL_IMAP_PORT:993}
    account-created-at: ${GMAIL_ACCOUNT_CREATED_AT:2026-05-04}

  ai:
    mock-enabled: ${AI_MOCK_ENABLED:false}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      model: llama-3.3-70b-versatile
      timeout-seconds: 30
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.0-flash
      timeout-seconds: 30

  osm:
    base-url: ${OSM_OVERPASS_URL:https://overpass-api.de/api/interpreter}
    min-request-interval-ms: ${OSM_MIN_INTERVAL_MS:1000}
    timeout-seconds: ${OSM_TIMEOUT_SECONDS:25}

  apify:
    # When APIFY_API_TOKEN is unset the ApifyClient bean is not registered and
    # discovery runs OSM-only. Filters with source='apify' then fail fast.
    api-token: ${APIFY_API_TOKEN:}
    google-maps-actor: ${APIFY_GOOGLE_MAPS_ACTOR:compass~crawler-google-places}
    timeout-seconds: ${APIFY_TIMEOUT_SECONDS:120}
    max-places-per-search: ${APIFY_MAX_PLACES:50}

  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}

resilience4j:
  circuitbreaker:
    instances:
      groq:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
      gemini:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50

---
spring:
  config:
    activate:
      on-profile: local

app:
  ai:
    # Default true so plain local dev needs no API keys, but honor AI_MOCK_ENABLED
    # so Görev 5 (live Groq end-to-end) can flip it to false from .env.local.
    mock-enabled: ${AI_MOCK_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 5

logging:
  level:
    root: WARN
    com.akincoskun.outreach: INFO
    # Matcher decisions logged at DEBUG to investigate skippedNoMatch (Görev 12
    # follow-up): shows below-threshold vs off-target and the AI's slug/confidence.
    # Low volume (one per company); set MATCHER_LOG_LEVEL=INFO to quiet it later.
    com.akincoskun.outreach.service.agent.MatcherService: ${MATCHER_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never