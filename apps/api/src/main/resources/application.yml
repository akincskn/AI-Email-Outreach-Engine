spring:
  application:
    name: outreach-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/outreach}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        mime:
          charset: UTF-8
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${BASE_URL:http://localhost:8080}

  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-production-32chars}
    jwt-expiration-ms: 86400000
    hmac-secret: ${HMAC_SECRET:dev-hmac-secret-change-in-production-32chars}
    n8n-api-key: ${N8N_WEBHOOK_API_KEY:dev-n8n-api-key}

  sender:
    physical-address: ${SENDER_PHYSICAL_ADDRESS:Your Address Here}
    from-name: ${MAIL_FROM_NAME:Akın Coşkun}
    from-email: ${MAIL_FROM:test@localhost}

  test:
    recipient-override: ${LOCAL_TEST_RECIPIENT_OVERRIDE:}

  gmail:
    imap-host: ${GMAIL_IMAP_HOST:imap.gmail.com}
    imap-port: ${GMAIL_IMAP_PORT:993}
    account-created-at: ${GMAIL_ACCOUNT_CREATED_AT:2026-05-04}

  ai:
    mock-enabled: ${AI_MOCK_ENABLED:false}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      model: llama-3.3-70b-versatile
      timeout-seconds: 30
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.0-flash
      timeout-seconds: 30

  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}

  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}

resilience4j:
  circuitbreaker:
    instances:
      groq:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
      gemini:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50

---
spring:
  config:
    activate:
      on-profile: local

app:
  ai:
    mock-enabled: true

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 5

logging:
  level:
    root: WARN
    com.akincoskun.outreach: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never